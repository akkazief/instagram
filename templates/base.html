{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <title>Instagram</title>

</head>
<body>

{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'posts_list' %}">Instagram</a>

    <form action="{% url 'accounts:search' %}" method="get" class="d-flex mx-auto">
      <input type="text" name="q" class="form-control form-control-sm rounded-pill"
             placeholder="Поиск" value="{{ request.GET.q }}">
      <button type="submit">Найти</button>
    </form>

    <ul class="navbar-nav flex-row align-items-center gap-3">
      <li class="nav-item">
        <a class="nav-link" href="{% url 'posts_list' %}"><i class="fa-solid fa-house"></i></a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="{% url 'create_post' %}"><i class="fa-solid fa-square-plus"></i></a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="{% url 'accounts:profile' username=user.username %}">
          <img src="{{ user.avatar.url }}" alt="{{ user.username }}"
               class="rounded-circle" width="28" height="28" style="object-fit: cover;">
        </a>
      </li>
      <li class="nav-item">
        <form action="{% url 'accounts:logout' %}" method="post" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-link nav-link p-0">Выйти</button>
        </form>
      </li>
    </ul>
  </div>
</nav>
{% endif %}

<main class="container">
  {% if messages %}
    <div class="mt-3">
      {% for message in messages %}
        <div class="alert alert-warning py-2">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}

  {% block content %}
    {% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>
</html>
